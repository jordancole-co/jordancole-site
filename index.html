<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jordan Cole — Meditation is for Everybody</title>
  <meta name="description" content="Meditation is just a tool. A ridiculously simple and powerful one. Jordan Cole helps you use it to make real, tangible changes in your life.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --parchment: #fdfbf7;
      --slate: #2c2c2c;
      --slate-light: #5a5a5a;
      --clover: #548c3e;
      --warm-gray: #a39e95;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--parchment);
      color: var(--slate);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 440px;
      width: 100%;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.8);
        opacity: 1;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .breathing-dot {
      width: 8px;
      height: 8px;
      background: var(--clover);
      border-radius: 50%;
      margin: 0 auto 3rem;
      animation: breathe 5s ease-in-out infinite, fadeUp 0.8s ease-out both;
    }

    .logo {
      width: 60px;
      height: auto;
      margin: 0 auto 2.5rem;
      opacity: 0.8;
      animation: fadeUp 0.8s ease-out 0.1s both;
    }

    .headline {
      font-family: 'Instrument Serif', serif;
      font-size: 2.5rem;
      line-height: 1.15;
      font-weight: 400;
      color: var(--slate);
      margin-bottom: 1rem;
      animation: fadeUp 0.8s ease-out 0.2s both;
    }

    .body-text {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--slate-light);
      font-weight: 300;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.8s ease-out 0.3s both;
    }

    .meetup-link {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: white;
      background: var(--clover);
      padding: 0.9rem 2rem;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.25s ease, transform 0.15s ease;
      animation: fadeUp 0.8s ease-out 0.4s both;
    }

    .meetup-link:hover {
      background: #47782f;
      transform: translateY(-1px);
    }

    .meetup-link:active {
      transform: translateY(0);
    }

    .copyright {
      margin-top: 4rem;
      font-size: 0.65rem;
      color: var(--warm-gray);
      font-weight: 300;
      letter-spacing: 0.05em;
      animation: fadeUp 0.8s ease-out 0.5s both;
    }

    @media (max-width: 500px) {
      .headline {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="breathing-dot"></div>
    <img src="images/logo.svg" alt="Jordan Cole" class="logo" />
    <h1 class="headline">Something new is coming.</h1>
    <p class="body-text">
      This site is getting a fresh start. In the meantime, come meditate with me.
    </p>
    <a href="meetup.html" class="meetup-link">Join the Free Weekly Meetup</a>
    <p class="copyright">Jordan Cole 2026. All Rights Reserved.</p>
  </div>
</body>
</html>
