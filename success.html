<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're In! — Active Awareness Meetup</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --parchment: #fdfbf7;
      --slate: #2c2c2c;
      --slate-light: #5a5a5a;
      --clover: #548c3e;
      --warm-gray: #a39e95;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--parchment);
      color: var(--slate);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 500px;
      width: 100%;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--clover);
      color: white;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      animation: fadeUp 0.8s ease-out both;
    }

    .headline {
      font-family: 'Instrument Serif', serif;
      font-size: 2.5rem;
      line-height: 1.15;
      font-weight: 400;
      color: var(--slate);
      margin-bottom: 1.25rem;
      animation: fadeUp 0.8s ease-out 0.1s both;
    }

    .body-text {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--slate-light);
      font-weight: 300;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s ease-out 0.2s both;
    }

    .back-link {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--clover);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: opacity 0.25s ease;
      animation: fadeUp 0.8s ease-out 0.3s both;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    .footer-mark {
      text-align: center;
      margin-top: 3.5rem;
      animation: fadeUp 0.8s ease-out 0.4s both;
    }

    .footer-mark a {
      display: inline-block;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .footer-mark a:hover {
      opacity: 1;
    }

    .footer-mark img {
      width: 44px;
      height: auto;
    }

    .copyright {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.65rem;
      color: var(--warm-gray);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    @media (max-width: 500px) {
      body {
        padding: 2.5rem 1.25rem;
      }

      .headline {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="success-icon">&#10003;</div>

    <h1 class="headline">You're in!</h1>

    <p class="body-text">
      Check your email for a confirmation. Once confirmed, you'll receive a welcome email from me within a few minutes.
    </p>
    <p class="body-text">
      Be sure to check your spam/promotions folder if you don't see it.
    </p>

    <a href="https://jordancole.co" class="back-link">&larr; Back to jordancole.co</a>

    <div class="footer-mark">
      <a href="https://jordancole.co" aria-label="Visit jordancole.co">
        <img src="images/logo.svg" alt="JC" />
      </a>
    </div>

    <p class="copyright">Jordan Cole 2026. All Rights Reserved.</p>
  </div>
</body>
</html>
